# fly.toml app configuration file generated for dental-flow-server on 2026-03-08T22:09:08+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dental-flow-server'
primary_region = 'iad'

[build]
  context = '../..'
  dockerfile = '../../apps/server/Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '20s'
    interval = '15s'
    method = 'get'
    path = '/api/health'
    timeout = '5s'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
